version: "3.9"

services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8080:8080"

  backend:
    build: ./DSA-Tracker-Backend
    container_name: backend
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
      - kafka
      - eureka-server
    volumes:
      - ./DSA-Tracker-Backend:/env.properties:/app/env.properties

  autofill-service:
    build: ./autofill-service
    container_name: autofill-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
    volumes:
      - ./autofill-service:/env.properties:/app/env.properties

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - eureka-server
    volumes:
      - ./notification-service:/env.properties:/app/env.properties

volumes:
  kafka-data:
  mongo-data: